; thirteen firmware — ESP32-S3, native USB (HID keyboard + CDC serial)
;
; Default env targets the ESP32-S3-DevKitC-1. For the ESP32-S3 SuperMini
; (smaller board, fewer pins broken out) use env:supermini — pin overrides
; live in src/pins.h behind the SUPERMINI define.

[platformio]
default_envs = esp32-s3-devkitc-1

[env]
platform = espressif32@^6.7.0
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
build_flags =
    ; ARDUINO_USB_MODE=0 selects the TinyUSB (USB-OTG) stack, required for
    ; the HID + CDC composite device. CDC_ON_BOOT makes `Serial` the USB CDC.
    -D ARDUINO_USB_MODE=0
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D THIRTEEN_FW_VERSION=\"0.1.0\"
lib_deps =
    fastled/FastLED@^3.7.0
    bblanchon/ArduinoJson@^7.1.0

[env:esp32-s3-devkitc-1]
board = esp32-s3-devkitc-1

[env:supermini]
; Generic S3 SuperMini boards usually ship with 4MB flash / no PSRAM oct.
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -D SUPERMINI
